name: Release Desktop App

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            args: --bundles deb,rpm,appimage
            rust-targets: ""

          - name: Windows x64
            os: windows-2025
            args: --no-sign
            rust-targets: ""

          # macOS bundles are ad-hoc signed (bundle > macOS > signingIdentity
          # in tauri.conf.json); users must still remove the quarantine attribute
          # to bypass Gatekeeper. Do not pass --no-sign here.
          - name: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin

          - name: macOS Intel
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_GEE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GEE_OAUTH_CLIENT_ID }}
        with:
          projectPath: apps/geolibre-desktop
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          args: ${{ matrix.args }}
          uploadPlainBinary: true

      - name: Build MSIX package
        id: build_msix
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-msix.ps1

      - name: Upload MSIX release asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msix = "${{ steps.build_msix.outputs.msix_path }}"
          if (-not (Test-Path $msix)) {
            throw "No MSIX package was created at '$msix'."
          }
          gh release upload "${{ github.event.release.tag_name }}" $msix --clobber
